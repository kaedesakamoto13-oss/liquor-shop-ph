<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquor Shop PH</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: #fff;
}

header {
    background: linear-gradient(90deg, #8B0000, black);
    text-align: center;
    padding: 20px;
}

nav {
    background: #222;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

nav a:hover {
    color: gold;
}

section {
    padding: 40px;
    text-align: center;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    background: #222;
    width: 250px;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px gold;
}

.card img {
    width: 100%;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: orange;
}

#cart {
    position: fixed;
    right: 0;
    top: 0;
    background: black;
    width: 250px;
    height: 100%;
    padding: 15px;
    overflow-y: auto;
}

footer {
    background: black;
    padding: 15px;
    text-align: center;
}

/* Animation */
.fade {
    animation: fadeUp 1s;
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
    <h1>🍾 Liquor Shop PH</h1>
    <p>Owned by Ferniel D. Relova</p>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
</nav>

<section id="home" class="fade">
    <h2>Welcome!</h2>
    <p>Your one-stop shop for Philippine liquors.</p>
</section>

<section id="products" class="fade">
    <h2>Products</h2>

    <div class="products">

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Red_Horse_Beer.jpg">
            <h3>Red Horse</h3>
            <p>₱120</p>
            <button onclick="addToCart('Red Horse',120)">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/San_Miguel_Pale_Pilsen.jpg">
            <h3>San Miguel</h3>
            <p>₱100</p>
            <button onclick="addToCart('San Miguel',100)">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Tanduay_Rhum.jpg">
            <h3>Tanduay Rum</h3>
            <p>₱150</p>
            <button onclick="addToCart('Tanduay Rum',150)">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Ginebra_San_Miguel.jpg">
            <h3>Ginebra</h3>
            <p>₱110</p>
            <button onclick="addToCart('Ginebra',110)">Buy Now</button>
        </div>

    </div>
</section>

<!-- CART -->
<div id="cart">
    <h2>🛒 Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₱<span id="total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
</div>

<footer>
    <p>© 2026 Liquor Shop PH | Owner: Ferniel D. Relova</p>
</footer>

<script>
let total = 0;

function addToCart(item, price) {
    let li = document.createElement("li");
    li.textContent = item + " - ₱" + price;
    document.getElementById("cartItems").appendChild(li);

    total += price;
    document.getElementById("total").textContent = total;
}

function checkout() {
    if (total === 0) {
        alert("Cart is empty!");
    } else {
        alert("Thank you for your purchase! Total: ₱" + total);
        location.reload();
    }
}
</script>

</body>
</html>
